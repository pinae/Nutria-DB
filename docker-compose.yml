services:
  nutria_postgres:
    image: postgres:17
    volumes:
      - ./nutriaPostgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nutria
      - POSTGRES_USER=nutria
      - POSTGRES_PASSWORD=change-me-zbakhKStr543mT
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutria -d nutria"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: always

  nutria:
    build: .
    volumes:
      - ./static:/var/www/static
    environment:
      - NUTRIA_SECRET_KEY=change-me-tirnotaeronuadtirnDTNTORSOEDR78745289756
      - NUTRIA_JWT_SECRET=change-me-iaOEtr45n8EesTOStr4dtdtr67eaOTRsq52aeos
      - NUTRIA_DEBUG_MODE=False
      - NUTRIA_ALLOWED_HOSTS=localhost,127.0.0.1
      - NUTRIA_DB_ENGINE=django.db.backends.postgresql
      - NUTRIA_DB_NAME=nutria
      - NUTRIA_DB_USER=nutria
      - NUTRIA_DB_PASSWORD=change-me-zbakhKStr543mT
      - NUTRIA_DB_HOST=nutria_postgres
      - NUTRIA_DB_PORT=5432
      - NUTRIA_LANGUAGE_CODE=de-de
      - NUTRIA_TIME_ZONE=Europe/Berlin
      - NUTRIA_SUPERUSER=pina
      - NUTRIA_SUPERUSER_MAIL=pmk@ct.de
      - NUTRIA_SUPERUSER_PASSWORD=change-me-1234
    depends_on:
      nutria_postgres:
        condition: service_healthy
    restart: always

  nutria_nginx:
    image: nginx:alpine
    volumes:
      - ./docker-setup/nginx-app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/usr/share/nginx/html:ro
    depends_on:
      - nutria
    ports:
      - "127.0.0.1:8504:80"
    restart: always
